# CI workflow: runs generated artifact checks, format, lint, tests, and build.
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches:
      - main
      - "integration/**"

permissions:
  contents: read # Required to checkout repository contents.

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check generated artifacts are up to date
        run: npm run schema:check -w gitlode

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
